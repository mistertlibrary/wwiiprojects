<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WWII Project | Recommended Databases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Franklin:wght@400;600;700&family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #1B2B4B;
      --navy-dk: #111D33;
      --cream:   #F5EDD6;
      --tan:     #E4D4AC;
      --red:     #C0392B;
      --gold:    #C9A84C;
      --muted:   #6B6B5A;
      --ink:     #1A1A1A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Libre Franklin', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      background-image: radial-gradient(circle, rgba(245,237,214,.10) 1.5px, transparent 1.5px);
      background-size: 8px 8px;
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
    }

    .stamp {
      font-family: 'Courier Prime', monospace;
      font-size: .68rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      display: inline-block;
      padding: .2em 1em;
      margin-bottom: 1rem;
      opacity: .85;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: .05em;
      color: var(--cream);
      line-height: .95;
      margin-bottom: .35rem;
    }

    .sub {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(245,237,214,.55);
    }

    .rule {
      width: 200px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      margin: 1rem auto;
    }

    .byline {
      font-family: 'Courier Prime', monospace;
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--gold);
      opacity: .8;
    }

    /* ── GRID ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3.5rem;
    }

    .section-label {
      font-family: 'Courier Prime', monospace;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--tan);
      padding-bottom: .4rem;
      margin-bottom: 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    /* ── DATABASE CARD ── */
    .db-card {
      display: block;
      text-decoration: none;
      background: var(--navy);
      border-radius: 2px;
      padding: 1.25rem 1.35rem 1.1rem;
      position: relative;
      overflow: hidden;
      transition: transform .18s ease, box-shadow .18s ease;
      box-shadow: 2px 3px 10px rgba(27,43,75,.18);

      /* halftone */
      background-image: radial-gradient(circle, rgba(245,237,214,.07) 1.5px, transparent 1.5px);
      background-size: 8px 8px;
      background-color: var(--navy);
    }

    .db-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--red);
    }

    .db-card:hover {
      transform: translateY(-3px);
      box-shadow: 4px 8px 20px rgba(27,43,75,.28);
    }

    .db-card:hover::before {
      background: var(--gold);
    }

    .db-name {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: .2rem;
    }

    .db-vendor {
      font-family: 'Courier Prime', monospace;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .55rem;
    }

    .db-note {
      font-size: .8rem;
      color: rgba(245,237,214,.58);
      line-height: 1.5;
    }

    .db-arrow {
      display: block;
      margin-top: .75rem;
      font-family: 'Courier Prime', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(245,237,214,.35);
    }

    .db-card:hover .db-arrow {
      color: var(--gold);
    }

    /* ── TOPIC PAIRINGS ── */
    .pairings {
      margin-top: 2.5rem;
      background: #FEFAF2;
      border: 1px solid var(--tan);
      border-left: 5px solid var(--navy);
      border-radius: 2px;
      padding: 1.5rem 1.75rem;
    }

    .pairings h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: .85rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    th {
      font-family: 'Courier Prime', monospace;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: .35rem .5rem .35rem 0;
      border-bottom: 1px solid var(--tan);
    }

    td {
      padding: .5rem .5rem .5rem 0;
      border-bottom: 1px solid rgba(228,212,172,.4);
      vertical-align: top;
      color: var(--ink);
      line-height: 1.45;
    }

    td:first-child {
      font-weight: 700;
      color: var(--navy);
      white-space: nowrap;
      padding-right: 1.25rem;
    }

    tr:last-child td { border-bottom: none; }

    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; }
      table, thead, tbody, th, td, tr { display: block; }
      th { display: none; }
      td:first-child { padding-bottom: .15rem; }
      td { padding-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>WWII Projects | Recommended Databases</h1>
  <div class="rule"></div>
</header>

<main>

  <div class="grid">

    <a class="db-card" href="https://online.infobaselearning.com/Direct.aspx?pid=WE01&aid=17282" target="_blank" rel="noopener">
      <div class="db-name">African American History</div>
      <div class="db-vendor">Infobase</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

    <a class="db-card" href="https://americangovernment.abc-clio.com/?setcustomercontext=16772" target="_blank" rel="noopener">
      <div class="db-name">American Government</div>
      <div class="db-vendor">ABC-Clio</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

    <a class="db-card" href="https://wehs.westex.libguides.com/amhis" target="_blank" rel="noopener">
      <div class="db-name">American History</div>
      <div class="db-vendor">Infobase</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

    <a class="db-card" href="https://link.gale.com/apps/UHIC?u=nort87507" target="_blank" rel="noopener">
      <div class="db-name">U.S. History in Context</div>
      <div class="db-vendor">Gale</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

    <a class="db-card" href="https://research.ebsco.com/c/t3bsam?db=mth" target="_blank" rel="noopener">
      <div class="db-name">Military &amp; Government</div>
      <div class="db-vendor">EBSCO</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

    <a class="db-card" href="https://online.infobaselearning.com/Direct.aspx?pid=WE53&aid=17282" target="_blank" rel="noopener">
      <div class="db-name">Modern World History</div>
      <div class="db-vendor">Infobase</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

    <a class="db-card" href="https://jstor.org" target="_blank" rel="noopener">
      <div class="db-name">JSTOR</div>
      <div class="db-vendor">Ithaka</div>
      <span class="db-arrow">Access &rarr;</span>
    </a>

  </div>

</main>

</body>
</html>
